<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>A Question For You 💕</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #1a0c10 0%, #0e0608 100%);
        font-family: "Segoe UI", "Montserrat", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      /* Floating hearts animation */
      .heart {
        position: fixed;
        bottom: -20px;
        font-size: 20px;
        animation: floatUp 8s linear infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) rotate(360deg);
          opacity: 0;
        }
      }

      .game-container {
        background: rgba(30, 15, 20, 0.95);
        border-radius: 20px;
        padding: 40px;
        max-width: 600px;
        width: 90%;
        text-align: center;
        box-shadow: 0 0 50px rgba(201, 168, 76, 0.2);
        border: 1px solid rgba(201, 168, 76, 0.3);
        z-index: 1;
        position: relative;
      }

      h1 {
        color: #e8d5a0;
        font-size: 24px;
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      .question-counter {
        color: #8a6a6e;
        font-size: 14px;
        margin: 20px 0 10px;
        letter-spacing: 2px;
      }

      .question-text {
        color: #f5e6e8;
        font-size: 28px;
        margin: 20px 0;
        line-height: 1.4;
        min-height: 120px;
        font-style: italic;
      }

      .progress-bar {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        margin: 20px 0;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #8b1a2e, #c9a84c);
        width: 0%;
        transition: width 0.3s ease;
      }

      .buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin: 30px 0;
        position: relative;
      }

      .btn-yes {
        background: linear-gradient(135deg, #8b1a2e, #c4294a);
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: bold;
        letter-spacing: 2px;
      }

      .btn-yes:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(196, 41, 74, 0.5);
      }

      .btn-no {
        background: rgba(139, 26, 46, 0.6);
        color: #e8d5a0;
        border: 2px solid #c9a84c;
        padding: 15px 40px;
        font-size: 18px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.05s linear;
        position: fixed;
        font-weight: bold;
        letter-spacing: 2px;
        backdrop-filter: blur(5px);
      }

      .reward-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
      }

      .reward-overlay.show {
        display: flex;
      }

      .reward-img {
        max-width: 80%;
        max-height: 60vh;
        border-radius: 10px;
        border: 3px solid #c9a84c;
        box-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
      }

      .reward-caption {
        color: #e8d5a0;
        font-size: 24px;
        font-style: italic;
      }

      .reward-timer {
        color: #8a6a6e;
        font-size: 14px;
      }

      .done-screen {
        display: none;
      }

      .done-screen.show {
        display: block;
      }

      .done-heart {
        font-size: 60px;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      .stats {
        position: fixed;
        bottom: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 10px;
        border-radius: 10px;
        font-size: 12px;
        color: #c9a84c;
        font-family: monospace;
      }

      .music-control {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(139, 26, 46, 0.8);
        border: 2px solid #c9a84c;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 24px;
        z-index: 100;
      }

      @media (max-width: 600px) {
        .game-container {
          padding: 20px;
        }
        .question-text {
          font-size: 20px;
        }
        .btn-yes,
        .btn-no {
          padding: 10px 20px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <h1>💕 A QUESTION FOR YOU, MY LOVE HAZEL 💕</h1>
      <div class="question-counter" id="counter">Question 1 of --</div>
      <div class="question-text" id="question">Loading questions...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>
      <div class="buttons">
        <button class="btn-yes" id="yesBtn">✦ YES ✦</button>
      </div>
      <div class="done-screen" id="doneScreen">
        <div class="done-heart">💕</div>
        <div class="question-text">You answered perfectly, as always.</div>
        <p>Thank you for being you.</p>
      </div>
    </div>

    <button class="btn-no" id="noBtn">NO</button>
    <div class="music-control" id="musicBtn">🔇</div>
    <div class="stats" id="stats">NO size: 100%</div>

    <div class="reward-overlay" id="rewardOverlay">
      <img class="reward-img" id="rewardImg" src="" alt="Our memory" />
      <div class="reward-caption" id="rewardCaption">I knew it 💕</div>
      <div class="reward-timer" id="rewardTimer">continuing in 3...</div>
    </div>

    <script>
      // Create floating hearts
      function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["💕", "💖", "💗", "💓", "💝"][
          Math.floor(Math.random() * 5)
        ];
        heart.style.left = Math.random() * 100 + "%";
        heart.style.animationDuration = 4 + Math.random() * 4 + "s";
        heart.style.fontSize = 10 + Math.random() * 20 + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }
      setInterval(createHeart, 1000);

      // Game variables
      let questions = [];
      let images = [];
      let currentQuestion = 0;
      let usedImages = [];
      let shrinkCount = 0;
      let yesCount = 0;
      let captionIndex = 0;
      let musicPlaying = false;
      let audio = null;

      // DOM elements
      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");
      const counter = document.getElementById("counter");
      const questionEl = document.getElementById("question");
      const progress = document.getElementById("progress");
      const rewardOverlay = document.getElementById("rewardOverlay");
      const rewardImg = document.getElementById("rewardImg");
      const rewardCaption = document.getElementById("rewardCaption");
      const rewardTimer = document.getElementById("rewardTimer");
      const doneScreen = document.getElementById("doneScreen");
      const stats = document.getElementById("stats");
      const musicBtn = document.getElementById("musicBtn");

      // Load questions from questions.txt
      async function loadQuestions() {
        try {
          const response = await fetch("/questions.txt");
          const text = await response.text();
          questions = text
            .split(/\r?\n/)
            .filter((line) => line.trim().length > 0);
          console.log("Loaded questions:", questions.length);
          if (questions.length === 0) {
            questions = [
              "Do you love me? 💕",
              "Do I make you happy? ✨",
              "Will you be my Valentine? 🌹",
              "Do you want to travel with me? ✈️",
              "Am I your favorite person? 💖",
            ];
          }
          startGame();
        } catch (error) {
          console.error("Error loading questions:", error);
          questions = [
            "Do you love me? 💕",
            "Do I make you happy? ✨",
            "Will you be my Valentine? 🌹",
            "Do you want to travel with me? ✈️",
            "Am I your favorite person? 💖",
          ];
          startGame();
        }
      }

      // Load images - list your images here
      function loadImages() {
        const imageNames = [
          "photo (1).jpeg",
          "photo (2).jpeg",
          "photo (3).jpeg",
          "photo (4).jpeg",
          "photo (5).jpeg",
          "photo (6).jpeg",
          "photo (7).jpeg",
          "photo (8).jpeg",
          "photo (9).jpeg",
          "photo (10).jpeg",
          "photo (11).jpeg",
        ];

        images = imageNames.map((name) => `/images/${name}`);
        usedImages = [...images];
        console.log("Loaded images:", images.length);
      }

      // Captions in order
      const captions = [
        "💕 I knew it!",
        "✨ You're amazing!",
        "🌹 My heart belongs to you",
        "💫 Forever and always",
        "🥰 You make me so happy",
        "💞 Every time, yes!",
        "🥰 HAZEL is the BEST!",
        "🌹 My Sexy HAZEL!!!",
        "💖 HAZEL is my everything",
        "💕 Will Always Love YOU Hazelina!",
        "✨✨✨ WE WILL MEET AGAIN MY LOVE",
      ];

      function getNextCaption() {
        const caption = captions[captionIndex % captions.length];
        captionIndex++;
        return caption;
      }

      function pickImage() {
        if (usedImages.length === 0) {
          usedImages = [...images];
        }
        if (usedImages.length === 0) return null;
        const idx = Math.floor(Math.random() * usedImages.length);
        const image = usedImages[idx];
        usedImages.splice(idx, 1);
        return image;
      }

      function startGame() {
        currentQuestion = 0;
        showQuestion();
        placeNoButton();
      }

      function showQuestion() {
        if (currentQuestion >= questions.length) {
          // Game complete
          document.querySelector(".buttons").style.display = "none";
          doneScreen.classList.add("show");
          noBtn.style.display = "none";
          return;
        }

        counter.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
        questionEl.textContent = questions[currentQuestion];
        progress.style.width = `${(currentQuestion / questions.length) * 100}%`;

        // Reset NO button size
        shrinkCount = 0;
        updateNoButtonSize();
      }

      function updateNoButtonSize() {
        const scale = Math.max(0.15, 1 - shrinkCount * 0.085);
        noBtn.style.transform = `scale(${scale})`;
        stats.innerHTML = `NO size: ${Math.floor(scale * 100)}%`;

        if (scale < 0.4) {
          noBtn.style.background = "rgba(100,20,35,0.4)";
        } else if (scale < 0.6) {
          noBtn.style.background = "rgba(139,26,46,0.6)";
        } else {
          noBtn.style.background = "rgba(139,26,46,0.8)";
        }
      }

      function shrinkNoButton() {
        shrinkCount++;
        updateNoButtonSize();
      }

      function growYesButton() {
        yesCount++;
        yesBtn.style.transform = `scale(${1 + Math.min(0.6, yesCount * 0.05)})`;
        yesBtn.style.transition = "transform 0.1s ease";

        // Flash effect
        yesBtn.style.boxShadow = "0 0 30px rgba(196,41,74,0.8)";
        setTimeout(() => {
          yesBtn.style.boxShadow = "0 0 10px rgba(196,41,74,0.5)";
        }, 200);
      }

      function placeNoButton() {
        const yesRect = yesBtn.getBoundingClientRect();
        let left = yesRect.right + 30;
        let top = yesRect.top;

        if (left + 100 > window.innerWidth - 20) {
          left = yesRect.left - 130;
        }
        top = Math.max(20, Math.min(window.innerHeight - 60, top));
        left = Math.max(20, Math.min(window.innerWidth - 100, left));

        noBtn.style.left = left + "px";
        noBtn.style.top = top + "px";
      }

      function showReward() {
        const imgSrc = pickImage();
        if (imgSrc) {
          rewardImg.src = imgSrc;
          rewardImg.style.display = "block";
        } else {
          rewardImg.style.display = "none";
        }

        rewardCaption.textContent = getNextCaption();
        rewardOverlay.classList.add("show");

        let seconds = 3;
        rewardTimer.textContent = `continuing in ${seconds}...`;

        const interval = setInterval(() => {
          seconds--;
          if (seconds <= 0) {
            clearInterval(interval);
            rewardOverlay.classList.remove("show");
            currentQuestion++;
            showQuestion();
          } else {
            rewardTimer.textContent = `continuing in ${seconds}...`;
          }
        }, 1000);
      }

      // Mouse tracking for NO button
      document.addEventListener("mousemove", (e) => {
        if (currentQuestion >= questions.length) return;

        const rect = noBtn.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dist = Math.hypot(e.clientX - centerX, e.clientY - centerY);

        if (dist < 120) {
          // Shrink when close
          if (dist < 80 && shrinkCount < 12) {
            shrinkNoButton();
          }

          // Move away
          const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
          const force = (120 - dist) * 2;
          let newLeft = rect.left + Math.cos(angle + Math.PI) * (force + 50);
          let newTop = rect.top + Math.sin(angle + Math.PI) * (force + 50);

          newLeft = Math.max(
            10,
            Math.min(window.innerWidth - rect.width - 10, newLeft),
          );
          newTop = Math.max(
            10,
            Math.min(window.innerHeight - rect.height - 10, newTop),
          );

          noBtn.style.left = newLeft + "px";
          noBtn.style.top = newTop + "px";

          if (dist < 80 && Math.random() > 0.7) {
            growYesButton();
          }
        }
      });

      // NO button click
      noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (currentQuestion >= questions.length) return;

        shrinkNoButton();
        shrinkNoButton();
        shrinkNoButton();
        growYesButton();
        placeNoButton();
      });

      // YES button click
      yesBtn.addEventListener("click", () => {
        if (currentQuestion >= questions.length) return;
        showReward();
        growYesButton();
        if (shrinkCount > 0) {
          shrinkCount = Math.max(0, shrinkCount - 1);
          updateNoButtonSize();
        }
      });

      // Music player
      function initMusic() {
        audio = new Audio("/music/track1.mp3");
        audio.loop = true;
        audio.volume = 0.3;
        audio.addEventListener("error", () =>
          console.log("Music file not found. Add /music/track1.mp3"),
        );
      }

      musicBtn.addEventListener("click", () => {
        if (!audio) initMusic();
        if (musicPlaying) {
          audio.pause();
          musicPlaying = false;
          musicBtn.innerHTML = "🔇";
        } else {
          audio.play().catch((e) => console.log("Playback failed"));
          musicPlaying = true;
          musicBtn.innerHTML = "🎵";
        }
      });

      // Start music on first click anywhere
      document.body.addEventListener(
        "click",
        () => {
          if (!musicPlaying && !audio) {
            initMusic();
            audio.play().catch((e) => console.log("User interaction needed"));
            musicPlaying = true;
            musicBtn.innerHTML = "🎵";
          }
        },
        { once: true },
      );

      // Handle window resize
      window.addEventListener("resize", () => {
        placeNoButton();
      });

      // Initialize everything
      loadImages();
      loadQuestions();

      // Set initial position
      setTimeout(() => placeNoButton(), 100);
    </script>
  </body>
</html>
